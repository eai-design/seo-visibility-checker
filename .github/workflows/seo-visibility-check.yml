name: SEO Visibility Check

on:
  workflow_dispatch:
    inputs:
      urls:
        description: Paste URLs separated by comma, space, or newline
        required: true
        type: string

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Write URL list
        run: |
          python3 - <<'PY'
          import re

          raw = '''${{ inputs.urls }}'''
          urls = [u.strip() for u in re.split(r'[\s,]+', raw) if u.strip()]
          with open('sites.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(urls) + '\n')
          print(f'Loaded {len(urls)} URL(s)')
          PY
      - name: Run checker
        run: |
          mkdir -p docs/reports
          python3 batch_seo_visibility_checker.py sites.txt docs/reports/latest.csv
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports/latest.csv
          git diff --cached --quiet || git commit -m "Update SEO visibility report"
          git push
